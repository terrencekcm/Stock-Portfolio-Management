<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球資產配置與計劃管理系統 (USD Base)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body class="bg-gray-100 font-sans p-6">

    <div id="loginWall" class="fixed inset-0 bg-gray-900 flex flex-col justify-center items-center z-50 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl text-center max-w-sm w-full space-y-6">
            <div class="space-y-2">
                <h2 class="text-2xl font-bold text-gray-800">🔐 團隊資產管理系統</h2>
                <p class="text-sm text-gray-400">本系統採用雲端安全防禦，請使用白名單帳戶登入</p>
            </div>
            <div id="gBtn" class="flex justify-center"></div>
            <p id="loginError" class="text-sm text-red-500 hidden"></p>
        </div>
    </div>

    <div class="max-w-7xl mx-auto space-y-6">
        
        <div class="bg-white p-4 rounded-xl shadow-sm flex flex-wrap justify-between items-center gap-4">
            <div>
                <h1 class="text-xl font-bold text-gray-800">📊 全球資產配置與計劃管理系統</h1>
                <p class="text-xs text-gray-500">權限級別：<span id="userRoleBadge" class="font-semibold text-blue-600">驗證中...</span></p>
            </div>
            <div id="statusMessage" class="text-sm text-gray-500"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="bg-white p-6 rounded-xl shadow-sm space-y-4 lg:col-span-1">
                <h3 class="text-lg font-bold text-gray-700 border-b pb-2">新增交易流水</h3>
                
                <div class="flex gap-2">
                    <button onclick="switchTxType('STOCK')" id="btnTypeStock" class="flex-1 py-2 rounded-lg font-medium text-sm bg-blue-600 text-white">股票/資產交易</button>
                    <button onclick="switchTxType('CASH')" id="btnTypeCash" class="flex-1 py-2 rounded-lg font-medium text-sm bg-gray-200 text-gray-700">現金調整</button>
                </div>

                <form id="txForm" class="space-y-3">
                    <div id="stockFields" class="space-y-3">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">資產代碼 (e.g., NVDA, AVGO)</label>
                            <input type="text" id="stockCode" class="w-full border p-2 rounded-lg text-sm uppercase" placeholder="NVDA">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-xs font-medium text-gray-500 mb-1">交易價格 (USD)</label>
                                <input type="number" step="0.0001" id="txPrice" class="w-full border p-2 rounded-lg text-sm" placeholder="0.00">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-500 mb-1">交易數量</label>
                                <input type="number" step="0.0001" id="txQty" class="w-full border p-2 rounded-lg text-sm" placeholder="0">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">交易方向</label>
                            <select id="stockTxType" class="w-full border p-2 rounded-lg text-sm">
                                <option value="BUY">🎯 現貨買入 (BUY)</option>
                                <option value="SELL">💸 現貨賣出 (SELL)</option>
                            </select>
                        </div>
                    </div>

                    <div id="cashFields" class="space-y-3 hidden">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">現金異動類型</label>
                            <select id="cashType" class="w-full border p-2 rounded-lg text-sm">
                                <option value="DEPOSIT">💰 外部入金 (DEPOSIT)</option>
                                <option value="WITHDRAW">🏧 外部出金 (WITHDRAW)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-500 mb-1">異動金額 (USD Base)</label>
                            <input type="number" step="0.01" id="cashAmount" class="w-full border p-2 rounded-lg text-sm" placeholder="0.00">
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-lg font-medium text-sm transition-all shadow-sm">寫入雲端數據庫</button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm lg:col-span-2 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-center border-b pb-2 mb-4">
                        <div class="flex items-center gap-3">
                            <h3 class="text-lg font-bold text-gray-700">📈 技術面多維動態陰陽燭圖</h3>
                            <span id="currentSymbolBadge" class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded">NASDAQ:NVDA</span>
                        </div>
                        <div class="text-xs text-gray-400">
                            預期下季財報日: <span id="earningsDateContainer" class="font-medium text-gray-700">載入中...</span>
                        </div>
                    </div>
                    
                    <div class="flex gap-2 mb-4 flex-wrap">
                        <button onclick="loadTradingViewChart('NVDA')" class="px-3 py-1 bg-gray-100 hover:bg-gray-200 text-xs font-medium rounded-md transition">NVDA</button>
                        <button onclick="loadTradingViewChart('AVGO')" class="px-3 py-1 bg-gray-100 hover:bg-gray-200 text-xs font-medium rounded-md transition">AVGO</button>
                        <button onclick="loadTradingViewChart('KTOS')" class="px-3 py-1 bg-gray-100 hover:bg-gray-200 text-xs font-medium rounded-md transition">KTOS</button>
                        <button onclick="loadTradingViewChart('TMDX')" class="px-3 py-1 bg-gray-100 hover:bg-gray-200 text-xs font-medium rounded-md transition">TMDX</button>
                    </div>

                    <div id="chartContainer" class="w-full h-[400px] border border-gray-200 rounded-xl overflow-hidden bg-gray-50">
                        </div>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm overflow-hidden">
            <h3 class="text-lg font-bold text-gray-700 border-b pb-2 mb-4">📜 全球資產配置實時交易流水</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-gray-500">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-50">
                        <tr>
                            <th class="p-3">交易 ID</th>
                            <th class="p-3">日期</th>
                            <th class="p-3">標的代碼</th>
                            <th class="p-3">類型</th>
                            <th class="p-3">結算價 (USD)</th>
                            <th class="p-3">數量</th>
                            <th class="p-3">操作</th>
                        </tr>
                    </thead>
                    <tbody id="txTableBody" class="divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // ⚠️ 請更換為您的 Google Cloud 用戶端 ID
        const GOOGLE_CLIENT_ID = "888888888888-xxxxxxxxxxxxxxxxxxxx.apps.googleusercontent.com";
        // ⚠️ 請填入您發佈的 Google Apps Script 網頁應用程式 URL
        const API_URL = "https://script.google.com/macros/s/XXXXXX/exec";

        let userGoogleToken = "";
        let userRole = "Visitor";
        let currentActiveType = "STOCK";

        window.onload = function () {
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(document.getElementById("gBtn"), { theme: "outline", size: "large", width: 320 });
        };

        async function handleCredentialResponse(response) {
            userGoogleToken = response.credential;
            document.getElementById("statusMessage").innerText = "🔄 正在完成白名單安全校驗...";
            await loadSystemData();
            document.getElementById("loginWall").classList.add("hidden");
            // 系統預設載入旗艦標的 NVDA
            loadTradingViewChart("NVDA");
        }

        /**
         * 呼叫後端讀取流水數據與權限配置
         */
        async function loadSystemData() {
            try {
                const res = await fetch(`${API_URL}?token=${userGoogleToken}`);
                const data = await res.json();
                if (data.result === "success") {
                    userRole = data.role;
                    document.getElementById("userRoleBadge").innerText = userRole;
                    renderTable(data.transactions);
                } else {
                    showError("安全校驗失敗，請聯繫 PM 管理員核對白名單。");
                }
            } catch (err) {
                showError("後端通訊故障，請檢查網路或 Apps Script 發佈狀態。");
            }
        }

        /**
         * 🎯 動態加載 TradingView 內嵌進階圖表 (免除 API 限制核心功能)
         */
        function loadTradingViewChart(symbol) {
            let cleanSymbol = symbol.toUpperCase().trim();
            document.getElementById("currentSymbolBadge").innerText = `市場定位: ${cleanSymbol}`;
            
            // 智能識別美股交易所字首 (專為核心資產配置優化)
            let exchangePrefix = "NASDAQ:";
            if (["AVGO", "NVDA", "KTOS", "TMDX"].includes(cleanSymbol)) {
                exchangePrefix = "NASDAQ:";
            }

            // 清空舊容器，準備注入新的小組件
            const container = document.getElementById("chartContainer");
            container.innerHTML = `<div id="tradingview_advanced_engine" class="w-full h-full"></div>`;

            // 實例化 TradingView 進階繪圖核心
            new TradingView.widget({
                "autosize": true,
                "symbol": exchangePrefix + cleanSymbol,
                "interval": "D",
                "timezone": "Asia/Hong_Kong",
                "theme": "light",
                "style": "1", // 1 代表陰陽燭 (Candlesticks)
                "locale": "zh_TW",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": false, // 顯示左側畫線工具欄，方便進行技術分析技術畫線
                "allow_symbol_change": true,
                "container_id": "tradingview_advanced_engine",
                "studies": [
                    "MASimple@tv-basicstudies" // 可根據需要在此處增加預設指標
                ]
            });

            // 異步從小工具或後端取回低頻財報公佈日
            updateEarningsDate(cleanSymbol);
        }

        /**
         * 調用 Apps Script 向 Alpha Vantage 索取輕量財報日期數據
         */
        async function updateEarningsDate(symbol) {
            const container = document.getElementById("earningsDateContainer");
            container.innerText = "查詢中...";
            try {
                const res = await fetch(`${API_URL}?token=${userGoogleToken}&action=getEarningsDate&symbol=${symbol}`);
                const data = await res.json();
                if (data.result === "success") {
                    container.innerText = data.earningsDate;
                } else {
                    container.innerText = "無數據";
                }
            } catch (e) {
                container.innerText = "獲取超時";
            }
        }

        function switchTxType(type) {
            currentActiveType = type;
            if (type === "STOCK") {
                document.getElementById("stockFields").classList.remove("hidden");
                document.getElementById("cashFields").classList.add("hidden");
                document.getElementById("btnTypeStock").className = "flex-1 py-2 rounded-lg font-medium text-sm bg-blue-600 text-white";
                document.getElementById("btnTypeCash").className = "flex-1 py-2 rounded-lg font-medium text-sm bg-gray-200 text-gray-700";
            } else {
                document.getElementById("stockFields").classList.add("hidden");
                document.getElementById("cashFields").classList.remove("hidden");
                document.getElementById("btnTypeStock").className = "flex-1 py-2 rounded-lg font-medium text-sm bg-gray-200 text-gray-700";
                document.getElementById("btnTypeCash").className = "flex-1 py-2 rounded-lg font-medium text-sm bg-blue-600 text-white";
            }
        }

        // 提交交易表單
        document.getElementById("txForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            if (userRole === "Visitor") { alert("🚫 越權攔截：訪客角色無權寫入數據！"); return; }
            
            const submitBtn = document.getElementById("submitBtn");
            submitBtn.disabled = true;
            document.getElementById("statusMessage").innerText = "⏳ 正在同步排隊鎖，寫入雲端...";

            let payload = {
                id: "TX" + Date.now(),
                date: new Date().toISOString().split('T')[0],
                token: userGoogleToken
            };

            if (currentActiveType === "STOCK") {
                payload.code = document.getElementById("stockCode").value.toUpperCase().trim();
                payload.type = document.getElementById("stockTxType").value;
                payload.price = document.getElementById("txPrice").value;
                payload.qty = document.getElementById("txQty").value;
                payload.market = "US";
            } else {
                payload.code = "CASH";
                payload.type = document.getElementById("cashType").value;
                payload.price = "1";
                payload.qty = document.getElementById("cashAmount").value;
                payload.market = "GLOBAL";
            }

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify(payload)
                });
                const resultData = await response.json();
                if (resultData.result === "success") {
                    document.getElementById("statusMessage").innerText = "✅ 數據庫寫入成功！";
                    // 清空表單
                    document.getElementById("stockCode").value = "";
                    document.getElementById("txPrice").value = "";
                    document.getElementById("txQty").value = "";
                    document.getElementById("cashAmount").value = "";
                    await loadSystemData(); // 刷新表格
                } else {
                    alert("錯誤: " + resultData.error);
                }
            } catch (err) {
                alert("寫入失敗，請確認與 Apps Script 連線正常。");
            } finally {
                submitBtn.disabled = false;
            }
        });

        async function deleteTransaction(id) {
            if (userRole === "Visitor") { alert("🚫 權限不足：訪客無法刪除數據"); return; }
            if (!confirm("確定要永久刪除此筆交易流水嗎？")) return;

            document.getElementById("statusMessage").innerText = "🗑️ 正在執行安全刪除線程...";
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ action: "DELETE", token: userGoogleToken, id: id })
                });
                const res = await response.json();
                if (res.result === "success") {
                    document.getElementById("statusMessage").innerText = "✅ 賬目刪除成功";
                    await loadSystemData();
                } else {
                    alert("刪除失敗: " + res.error);
                }
            } catch (e) {
                alert("通訊失敗");
            }
        }

        function renderTable(txList) {
            const tbody = document.getElementById("txTableBody");
            tbody.innerHTML = "";
            txList.reverse().forEach(tx => {
                const row = document.createElement("tr");
                row.className = "hover:bg-gray-50 transition cursor-pointer";
                // 點擊整列可以自動無縫切換右邊的 TradingView 圖表
                if(tx.code !== 'CASH') {
                    row.onclick = () => loadTradingViewChart(tx.code);
                }
                
                row.innerHTML = `
                    <td class="p-3 text-xs font-mono">${tx.id}</td>
                    <td class="p-3">${tx.date}</td>
                    <td class="p-3 font-bold text-gray-900">${tx.code}</td>
                    <td class="p-3"><span class="px-2 py-0.5 rounded text-xs ${tx.type === 'BUY' || tx.type === 'DEPOSIT' ? 'bg-green-100 text-green-800':'bg-red-100 text-red-800'}">${tx.type}</span></td>
                    <td class="p-3 font-mono">${Number(tx.price).toFixed(2)}</td>
                    <td class="p-3 font-mono">${tx.qty}</td>
                    <td class="p-3"><button onclick="event.stopPropagation(); deleteTransaction('${tx.id}')" class="text-xs text-red-500 hover:text-red-700 font-medium">刪除</button></td>
                `;
                tbody.appendChild(row);
            });
        }

        function showError(msg) {
            const errEl = document.getElementById("loginError");
            errEl.innerText = msg;
            errEl.classList.remove("hidden");
            document.getElementById("statusMessage").innerText = "⚠️ 發生安全錯誤。";
        }
    </script>
</body>
</html>
